<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAD News</title>
    <!-- 引入 Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 16px;
            transition: background-color 0.3s, color 0.3s;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            margin: 0;
            color: var(--tg-theme-text-color, #000);
        }
        .date {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #888);
            margin-top: 4px;
        }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--tg-theme-hint-color, #888);
            font-size: 16px;
            line-height: 1.6;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SAD News</h1>
        <div class="date" id="dateDisplay">載入中...</div>
    </div>

    <div id="newsContainer">
        <!-- 已經移除所有假新聞，目前為空白狀態等待真實新聞寫入 -->
        <div class="empty-state">
            🗞️ 目前尚無新聞資料<br><br>
            系統已清空所有測試內容，正在等待接入真實、權威的即時新聞來源。
        </div>
    </div>

    <script>
        // 初始化 Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // 展開全螢幕

        // 設定今天日期
        const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('zh-TW', options);

        // 主題色適應 (通知 TG App 準備好了)
        tg.ready();
    </script>
</body>
</html>
